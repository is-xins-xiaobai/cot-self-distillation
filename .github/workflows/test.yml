name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Install only core dependencies for testing
        pip install numpy
    
    - name: Run basic tests
      run: |
        python test_basic.py
    
    - name: Check code structure
      run: |
        python -c "import cot_strategies; print('✓ cot_strategies module OK')"
        python -c "import model_wrapper; print('✓ model_wrapper module OK')"
        python -c "from model_wrapper import MockModel; m = MockModel(); print('✓ MockModel OK')"
